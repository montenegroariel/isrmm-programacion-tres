<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejercicios JavaScript</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
      color: #333;
      background-color: #fcfcfc;
    }
    h1 {
      margin-bottom: 4px;
      font-size: 1.8rem;
      color: #222;
    }
    .ayuda {
      color: #666;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }
    label {
      display: block;
      margin: 16px 0 8px;
      font-weight: 600;
      color: #444;
    }
    select, textarea, button, pre {
      width: 100%;
      box-sizing: border-box;
      font-size: 15px;
      font-family: inherit;
      border-radius: 4px;
    }
    select, textarea {
      padding: 10px;
      border: 1px solid #ccc;
      background-color: #fff;
      transition: border-color 0.2s;
    }
    select:focus, textarea:focus {
      outline: none;
      border-color: #888;
    }
    textarea {
      min-height: 150px;
      resize: vertical;
    }
    button {
      margin-top: 16px;
      padding: 10px 16px;
      background-color: #f0f0f0;
      color: #333;
      border: 1px solid #ccc;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #e4e4e4;
    }
    pre {
      min-height: 150px;
      border: 1px solid #ddd;
      padding: 12px;
      background: #f4f5f5;
      white-space: pre-wrap;
      margin-top: 8px;
      font-family: Consolas, Monaco, "Courier New", monospace;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>Ejercicios de JavaScript</h1>
  <p class="ayuda">Una sola entrada y una sola salida para los 3 ejercicios.</p>

  <label for="ejercicio">Seleccionar ejercicio</label>
  <select id="ejercicio">
    <option value="1">Ejercicio 1 - Números pares</option>
    <option value="2">Ejercicio 2 - Contador de palabras</option>
    <option value="3">Ejercicio 3 - Carrito de compras</option>
  </select>

  <label for="entrada">Entrada</label>
  <textarea id="entrada" placeholder=""></textarea>

  <button id="btn-ejecutar">Ejecutar</button>

  <label for="salida">Salida</label>
  <pre id="salida">Esperando datos...</pre>

  <script src="app.js"></script>
</body>
</html>
