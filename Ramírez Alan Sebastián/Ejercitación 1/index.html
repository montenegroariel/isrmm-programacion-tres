<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicios de Programación - Ramírez Alan Sebastián</title>
    <link rel="stylesheet" href="CSS/estilos.css">
</head>
<body>
    <h1>Resolución de Ejercicios</h1>

    <label for="selector-ejercicio">Elige el ejercicio:</label>
    <select id="selector-ejercicio">
        <option value="1">Ejercicio 1</option>
        <option value="2">Ejercicio 2</option>
        <option value="3">Ejercicio 3</option>
    </select>

    <br><br>

<textarea id="entrada-datos" placeholder="Escribe un número, presiona Enter, escribe otro..." rows="5"></textarea>
    <button id="btn-ejecutar">Ejecutar</button>

    <div id="contenedor-salida">
        <p id="salida-datos">Esperando ejecución...</p>
    </div>

    <script src="Javascript/ejercicio1.js"></script>
    <script src="Javascript/ejercicio2.js"></script>
    <script src="Javascript/ejercicio3.js"></script>
    <script src="Javascript/main.js"></script>
</body>
</html>
